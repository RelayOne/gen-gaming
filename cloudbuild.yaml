# Cloud Build pipeline — builds gen-gaming demo and deploys to Cloud Run.
# Project: relayone-488319 (per feedback_only_relayone_488319).
# No GitHub Actions are used (per feedback_no_github_actions).
#
# Trigger:
#   gcloud builds triggers create github \
#     --name=gen-gaming-main \
#     --repo-owner=RelayOne --repo-name=gen-gaming \
#     --branch-pattern=^main$ \
#     --build-config=cloudbuild.yaml \
#     --project=relayone-488319

substitutions:
  _SERVICE_NAME: gen-gaming-demo
  _REGION: us-central1
  _AR_REPO: gen-gaming

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: install
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm ci

  - id: typecheck
    name: node:20
    entrypoint: bash
    waitFor: ["install"]
    args:
      - -c
      - |
        set -euo pipefail
        npm run typecheck

  - id: test
    name: node:20
    entrypoint: bash
    waitFor: ["install"]
    args:
      - -c
      - |
        set -euo pipefail
        npm test

  - id: build-demo
    name: node:20
    entrypoint: bash
    waitFor: ["typecheck", "test"]
    args:
      - -c
      - |
        set -euo pipefail
        npm --workspace apps/demo run build

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    waitFor: ["build-demo"]
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - .

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    waitFor: ["docker-build"]
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}"

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    waitFor: ["docker-push"]
    args:
      - -c
      - |
        set -euo pipefail
        # Secrets are wired only when the named secrets exist in this project.
        # First deploy uses dev-fakes (the demo runs offline); production
        # deploy attaches R1 + AEGIS + KMS once those secrets are provisioned.
        SECRETS_FLAG=""
        for s in gen-gaming-r1-api-key gen-gaming-aegis-api-key gen-gaming-scene-store-kms-key; do
          if gcloud secrets describe "$s" --project="$PROJECT_ID" >/dev/null 2>&1; then
            : # exists
          else
            SECRETS_FLAG="missing"
            break
          fi
        done
        if [ -z "$SECRETS_FLAG" ]; then
          gcloud run deploy "${_SERVICE_NAME}" \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA" \
            --region "${_REGION}" --platform managed --allow-unauthenticated \
            --port 8080 --cpu 1 --memory 512Mi \
            --min-instances 0 --max-instances 5 \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "R1_API_KEY=gen-gaming-r1-api-key:latest,AEGIS_API_KEY=gen-gaming-aegis-api-key:latest,SCENE_STORE_KMS_KEY=gen-gaming-scene-store-kms-key:latest"
        else
          echo "Secrets not provisioned yet — deploying in dev-fakes mode."
          gcloud run deploy "${_SERVICE_NAME}" \
            --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA" \
            --region "${_REGION}" --platform managed --allow-unauthenticated \
            --port 8080 --cpu 1 --memory 512Mi \
            --min-instances 0 --max-instances 5 \
            --set-env-vars "NODE_ENV=production"
        fi

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"

timeout: 1200s
